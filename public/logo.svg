<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 150" width="100%" height="100%">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#003087" />
      <stop offset="100%" stop-color="#001F5C" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6200" />
      <stop offset="100%" stop-color="#CC4E00" />
    </linearGradient>
  </defs>
  <!-- Eagle/E Monogram -->
  <g transform="translate(20, 25)">
    <!-- Back wing / Top of E -->
    <path d="M0 0 L 60 0 L 80 20 L 20 20 Z" fill="url(#blueGrad)" />
    <!-- Middle of E / Eagle Head -->
    <path d="M0 40 L 50 40 L 70 60 L 40 60 L 30 70 L 10 50 Z" fill="url(#orangeGrad)" />
    <!-- Bottom wing / Bottom of E -->
    <path d="M0 80 L 60 80 L 100 100 L 20 100 Z" fill="url(#blueGrad)" />
    <path d="M0 0 L 20 20 L 20 100 L 0 80 Z" fill="url(#blueGrad)" />
    <!-- Eye -->
    <circle cx="50" cy="50" r="3" fill="#FFF" />
  </g>
  <!-- Text -->
  <text x="130" y="85" font-family="Arial, sans-serif" font-weight="bold" font-size="48" fill="#003087" letter-spacing="2">EAGLE-EXPRESS</text>
  <text x="135" y="110" font-family="Arial, sans-serif" font-weight="normal" font-size="16" fill="#FF6200" letter-spacing="4">GLOBAL LOGISTICS</text>
</svg>